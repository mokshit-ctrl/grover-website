<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grover Electric & Trading Corporation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:white;}

/* NAV */
nav{
display:flex;justify-content:space-between;align-items:center;
padding:20px 60px;position:fixed;width:100%;
background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);
z-index:1000;
}
nav h2{color:#d4af37;font-family:'Playfair Display';}
nav button{
padding:10px 18px;border:1px solid #d4af37;
background:transparent;color:#d4af37;border-radius:25px;
}

/* HERO */
.hero{
height:100vh;
display:flex;align-items:center;
padding:0 80px;
background:url('https://images.unsplash.com/photo-1505691938895-1758d7feb511') center/cover;
position:relative;
}
.hero::after{
content:'';position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.7);
}
.hero-content{position:relative;z-index:2;max-width:650px;}
.hero h1{
font-size:64px;
color:#e6c200;
font-family:'Playfair Display';
}
.hero p{margin:20px 0;opacity:0.85;}
.btn{
padding:14px 28px;border-radius:30px;margin-right:10px;
cursor:pointer;
}
.btn-gold{background:#d4af37;color:black;}
.btn-outline{border:1px solid #d4af37;color:#d4af37;background:transparent;}

/* SECTION */
.section{padding:80px 60px;text-align:center;}
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;margin-top:40px;
}
.card{
padding:25px;
background:#121212;
border-radius:20px;
border:1px solid rgba(212,175,55,0.2);
transition:0.4s;
}
.card:hover{
transform:translateY(-10px);
box-shadow:0 0 40px rgba(212,175,55,0.3);
}
.card img{width:100%;border-radius:10px;}

/* FORM */
.form{
max-width:500px;margin:auto;
display:flex;flex-direction:column;gap:15px;
}
.form input, .form textarea{
padding:12px;border:none;border-radius:10px;
background:#1a1a1a;color:white;
}
.form button{background:#d4af37;color:black;}

/* MAP */
.map iframe{
width:100%;
height:300px;
border-radius:15px;
border:none;
}

/* WHATSAPP */
.whatsapp{
position:fixed;bottom:20px;right:20px;
width:60px;height:60px;background:#25D366;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
z-index:1000;
}

/* STICKY CTA */
.cta{
position:fixed;
bottom:0;
width:100%;
background:#d4af37;
color:black;
text-align:center;
padding:12px;
font-weight:500;
cursor:pointer;
}

/* ANIMATION */
.fade{opacity:0;transform:translateY(30px);transition:1s;}
.fade.show{opacity:1;transform:translateY(0);}

footer{text-align:center;padding:20px;opacity:0.6;}
</style>
</head>

<body>

<nav>
<h2>Grover Electric</h2>
<button onclick="whatsapp()">WhatsApp</button>
</nav>

<section class="hero">
<div class="hero-content fade">
<h1>Where Light Meets Legacy</h1>
<p>Premium lighting & smart home solutions in Faridabad</p>
<button class="btn btn-gold">Explore Products</button>
<button class="btn btn-outline">Book Consultation</button>
</div>
</section>

<!-- SHOWROOM -->
<section class="section">
<h2>Our Showroom</h2>
<div class="cards">
<div class="card fade">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
</div>
<div class="card fade">
<img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c">
</div>
<div class="card fade">
<img src="https://images.unsplash.com/photo-1600573472592-401b489a3cdc">
</div>
</div>
</section>

<!-- REVIEWS -->
<section class="section">
<h2>Google Reviews</h2>
<p>⭐ 4.8 Rating from Customers</p>
<br>
<a href="https://www.google.com/search?q=Grover+Electric+Faridabad" target="_blank">
<button class="btn btn-gold">View Reviews</button>
</a>
</section>

<!-- LEAD FORM -->
<section class="section">
<h2>Book Site Visit</h2>

<div class="form">
<input type="text" placeholder="Your Name">
<input type="tel" placeholder="Phone Number">
<textarea placeholder="Project Requirement"></textarea>
<button>Submit Request</button>
</div>

</section>

<!-- MAP -->
<section class="section map">
<h2>Visit Our Showroom</h2>
<iframe src="https://maps.google.com/maps?q=Faridabad&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<footer>
© 2025 Grover Electric & Trading Corporation
</footer>

<!-- WHATSAPP -->
<a href="https://wa.me/919319908944" class="whatsapp">
<img src="https://img.icons8.com/ios-filled/50/ffffff/whatsapp.png" width="28">
</a>

<!-- STICKY CTA -->
<div class="cta" onclick="whatsapp()">
📞 Call / WhatsApp Now for Instant Quote
</div>

<script>
function whatsapp(){
window.open("https://wa.me/919319908944","_blank");
}

const faders=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
faders.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add('show');
}
});
});
</script>

</body>
</html>
